name: 🐳 Build & Deploy Docker Image

on:
  push:
    branches:
      - main        # Triggers on every push to main
  pull_request:
    branches:
      - main        # Also runs (build only) on PRs targeting main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/test   # mirrors your manual: docker push YOUR_USERNAME/test

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 – Build & push image to Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Check out source code
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-platform builds (linux/amd64 on Apple Silicon)
      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx (enables multi-platform & layer caching)
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Hub using repository secrets
      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Extract metadata (tags & labels) from Git context
      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with branch name (e.g., main)
            type=ref,event=branch
            # Tag with short git SHA (e.g., sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Always push a "latest" tag on the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # 6. Build image for linux/amd64 and push to Docker Hub
      #    (linux/amd64 ensures compatibility with Linux servers,
      #     even when developed on Apple Silicon / ARM)
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # Only push when this is a direct push to main (not a PR)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – Deploy: pull & run the new image on your server
  #          (only runs after a successful build on main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push   # wait for the image to be pushed first
    # Only deploy on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/test:latest

            # Stop and remove the old container (ignore errors if it doesn't exist)
            docker stop my-nginx-app || true
            docker rm   my-nginx-app || true

            # Start a fresh container on port 8105 (mirrors your manual run command)
            docker run -d \
              --name my-nginx-app \
              --restart unless-stopped \
              -p 8105:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/test:latest

            echo "✅ Deployment complete — container is running on port 8105"
